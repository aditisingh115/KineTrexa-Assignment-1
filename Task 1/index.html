<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Page</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
  <nav>
    <h2 class="logo">MyBrand</h2>
    <ul>
      <li><a href="#">Home</a></li>
      <li><a href="#">Features</a></li>
      <li><a href="#">Pricing</a></li>
      <li><a href="#">Contact</a></li>
    </ul>
  </nav>

  <div class="hero">
    <h1>Build Your Future</h1>
    <p>Modern solutions for your business</p>
    <button>Get Started</button>
  </div>
</header>

<section class="features">
  <h2>Our Features</h2>
  <div class="feature-box">
    <div class="card">Fast</div>
    <div class="card">Secure</div>
    <div class="card">Responsive</div>
  </div>
</section>

<section class="pricing">
  <h2>Pricing Plans</h2>
  <div class="price-box">
    <div class="card">Basic - ₹0</div>
    <div class="card">Pro - ₹199</div>
    <div class="card">Premium - ₹499</div>
  </div>
</section>

<section class="contact">
  <h2>Contact Us</h2>
  <form>
    <input type="text" placeholder="Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button type="submit">Send</button>
  </form>
</section>

</body>
</html>
